{{ define "main" }}
<div class="page">

  <div class="tags-header">
    <div class="sec-title">All Tags</div>
    <div class="search-wrap">
      <input class="search-input" type="text"
             placeholder="Search articles… (powered by Pagefind)"
             id="searchInput" autocomplete="off">
      <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    </div>
  </div>

  <div class="tags-bar" id="tagsBar">
    <button class="tag tag-lg" id="tagsGridToggle"></button>
    <button class="tag tag-lg active" id="tagsBarPill" style="display:none"></button>
  </div>

  <div class="tags-grid" id="tagsGrid"></div>

  <div id="tagArticles" class="posts-list"></div>

</div>
{{ end }}

{{ define "scripts" }}
<script>
const POSTS = [
  {{ range .Site.RegularPages }}{{ if ne .Params.page_lang "ru" -}}
  {
    url:     {{ .Permalink | jsonify | safeJS }},
    title:   {{ .Title | jsonify | safeJS }},
    date:    "{{ .Date.Format "2006-01-02" }}",
    tags:    [{{ range .Params.tags }}"{{ . | urlize }}",{{ end }}],
    tagLabels: [{{ range .Params.tags }}{{ . | jsonify | safeJS }},{{ end }}],
    summary: {{ with .Description }}{{ . | jsonify | safeJS }}{{ else }}{{ .Summary | plainify | truncate 120 | jsonify | safeJS }}{{ end }}
  },
  {{ end }}{{ end }}
];

/* ── search (Pagefind) ── */
const searchResults = document.createElement('div');
searchResults.id = 'searchResults';
searchResults.style.cssText = 'position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;z-index:50;max-height:400px;overflow-y:auto;display:none;box-shadow:var(--shadow)';
document.querySelector('.search-wrap').appendChild(searchResults);

let pf = null;
async function loadPagefind() {
  if (pf) return;
  try { pf = await import('/pagefind/pagefind.js'); await pf.init(); } catch(e) { console.warn('Pagefind not ready'); }
}

document.getElementById('searchInput').addEventListener('input', async function() {
  const q = this.value.trim();
  if (!q) { searchResults.style.display = 'none'; return; }
  await loadPagefind();
  if (!pf) { searchResults.style.display = 'none'; return; }
  const res = await pf.search(q);
  if (!res.results.length) {
    searchResults.innerHTML = '<div style="padding:14px 18px;font-size:12px;color:var(--text3)">No results for "' + q + '"</div>';
    searchResults.style.display = 'block'; return;
  }
  const items = await Promise.all(res.results.slice(0, 8).map(r => r.data()));
  searchResults.innerHTML = items.map(item =>
    `<a href="${item.url}" style="display:flex;flex-direction:column;padding:10px 18px;text-decoration:none;border-bottom:1px solid var(--border);transition:background .1s" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">
      <span style="font-size:12.5px;color:var(--accent)">${item.meta?.title || item.url}</span>
      <span style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5">${item.excerpt}</span>
    </a>`
  ).join('');
  searchResults.style.display = 'block';
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) searchResults.style.display = 'none'; });

/* ── tag filter ── */
const currentTag = {{ .Data.Term | urlize | jsonify | safeJS }};
let activeTag = currentTag;
let gridVisible = !currentTag; // collapsed when arriving with a pre-selected tag

function renderArticles() {
  const list = document.getElementById('tagArticles');
  const filtered = activeTag ? POSTS.filter(p => p.tags.includes(activeTag)) : POSTS;
  if (!filtered.length) {
    list.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:16px 0">No articles found.</div>';
    return;
  }
  list.innerHTML = filtered.map(p => {
    const tagHtml = p.tagLabels.slice(0, 2)
      .map(label => `<span class="tag">${label}</span>`)
      .join('');
    return `<a href="${p.url}" class="post-card">
      <div class="post-card-meta">
        <span class="post-date">${p.date}</span>${tagHtml}
      </div>
      <div class="post-card-title">${p.title}</div>
      ${p.summary ? `<div class="post-card-desc">${p.summary}</div>` : ''}
    </a>`;
  }).join('');
}

/* ── build tag grid from EN posts only ── */
function buildTagGrid() {
  const counts = {};
  const labels = {};
  POSTS.forEach(p => {
    p.tags.forEach((slug, i) => {
      counts[slug] = (counts[slug] || 0) + 1;
      labels[slug] = p.tagLabels[i];
    });
  });
  const sorted = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  const grid = document.getElementById('tagsGrid');
  grid.innerHTML =
    `<button class="tag tag-lg tag-filter" data-tag="">All <span class="count">${POSTS.length}</span></button>` +
    sorted.map(slug =>
      `<button class="tag tag-lg tag-filter" data-tag="${slug}">${labels[slug]} <span class="count">${counts[slug]}</span></button>`
    ).join('');
  document.querySelectorAll('.tag-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tag-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTag = btn.dataset.tag;
      gridVisible = false;
      renderArticles();
      updateUI();
    });
    if (btn.dataset.tag === activeTag) btn.classList.add('active');
  });
}
buildTagGrid();

const tagCount = Object.keys((() => { const c = {}; POSTS.forEach(p => p.tags.forEach(t => c[t] = 1)); return c; })()).length;

function updateUI() {
  const grid   = document.getElementById('tagsGrid');
  const toggle = document.getElementById('tagsGridToggle');
  const pill   = document.getElementById('tagsBarPill');

  grid.style.display = gridVisible ? '' : 'none';
  toggle.textContent = gridVisible ? `▲ Hide tags` : `▼ Browse all tags (${tagCount})`;

  if (activeTag) {
    const btn   = document.querySelector(`.tag-filter[data-tag="${activeTag}"]`);
    const label = btn ? btn.firstChild.textContent.trim() : activeTag;
    const count = btn ? btn.querySelector('.count').textContent : '';
    pill.innerHTML = `${label} <span class="count">${count}</span><span class="pill-close">×</span>`;
    pill.style.display = 'inline-flex';
  } else {
    pill.style.display = 'none';
  }
}

document.getElementById('tagsGridToggle').addEventListener('click', () => {
  gridVisible = !gridVisible;
  updateUI();
});

document.getElementById('tagsBarPill').addEventListener('click', () => {
  activeTag = '';
  gridVisible = true;
  document.querySelectorAll('.tag-filter').forEach(b => b.classList.remove('active'));
  document.querySelector('.tag-filter[data-tag=""]').classList.add('active');
  renderArticles();
  updateUI();
});

renderArticles();
updateUI();
</script>
{{ end }}
