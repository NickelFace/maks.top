baseURL = "https://maks.top"
languageCode = "en"
title = "maks.top"
theme = "maks"

[minify]
  minifyOutput = true
[pagination]
  pagerSize = 10

[params]
  author      = "Maks"
  description = "Linux & DevOps Knowledge Base — LPIC-2 · AWS · CKA · Networking"
  location    = "Sydney, AU"
  github      = "https://github.com/NickelFace"
  linkedin    = "https://www.linkedin.com/in/lopunov/"
  telegram    = "https://t.me/nickelface"
  email       = ""
  phone       = ""
  og_image    = ""   # default OG image path, e.g. "/img/og-default.png" (1200×630px)

[taxonomies]
  tag      = "tags"
  category = "categories"

[outputs]
  home    = ["HTML"]
  section = ["HTML"]
  page    = ["HTML"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 6
    ordered    = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      strikethrough = true
  [markup.highlight]
    noClasses   = false
    codeFences  = true
    guessSyntax = true
    lineNos     = false
    tabWidth    = 2
